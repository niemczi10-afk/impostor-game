<!DOCTYPE html>
<html>
<head>
  <title>Impostor Game</title>
</head>
<body>

<h2>Gra online (Impostor)</h2>

<input id="name" placeholder="Twoje imię" />
<button onclick="createRoom()">Stwórz pokój</button>

<br><br>

<input id="room" placeholder="Kod pokoju" />
<button onclick="joinRoom()">Dołącz</button>

<hr>

<button onclick="startGame()">Start gry</button>

<h3>Gracze:</h3>
<ul id="players"></ul>

<h3 id="role"></h3>

<hr>

<h3>Chat:</h3>
<div id="chat"></div>

<input id="msg" placeholder="wiadomość" />
<button onclick="send()">Wyślij</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>

const socket = io("https://impostor-game-tf4k.onrender.com");

let currentRoom = "";
let myName = "";

/* CREATE ROOM */
function createRoom() {
  myName = document.getElementById("name").value;

  socket.emit("createRoom", myName, (res) => {
    currentRoom = res.roomCode;
    alert("Kod pokoju: " + currentRoom);
    updatePlayers(res.players);
  });
}

/* JOIN ROOM */
function joinRoom() {
  myName = document.getElementById("name").value;
  const roomCode = document.getElementById("room").value;

  socket.emit("joinRoom", { roomCode, name: myName }, (res) => {
    if (res.error) return alert(res.error);

    currentRoom = roomCode;
    updatePlayers(res.players);
  });
}

/* START GAME */
function startGame() {
  socket.emit("startGame", currentRoom, (res) => {
    if (res?.error) {
      alert(res.error);
    }
  });
}

/* SEND MESSAGE */
function send() {
  const message = document.getElementById("msg").value;

  socket.emit("message", {
    roomCode: currentRoom,
    name: myName,
    message
  });
}

/* UPDATE PLAYERS */
socket.on("updatePlayers", updatePlayers);

/* CHAT */
socket.on("message", (data) => {
  document.getElementById("chat").innerHTML +=
    `<p><b>${data.name}:</b> ${data.message}</p>`;
});

/* ROLE (IMPOSTOR / CREWMATE) */
socket.on("role", (data) => {
  if (data.role === "IMPOSTOR") {
    document.getElementById("role").innerText =
      "IMPOSTOR - podpowiedź: " + data.hint;
  } else {
    document.getElementById("role").innerText =
      "CREWMATE - słowo: " + data.word;
  }
});

/* PLAYERS LIST */
function updatePlayers(players) {
  const ul = document.getElementById("players");
  ul.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.name;
    ul.appendChild(li);
  });
}

</script>

</body>
</html>
