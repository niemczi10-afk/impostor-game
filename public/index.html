<!DOCTYPE html>
<html>
<head>
  <title>Impostor Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      height: 100vh;
    }

    .panel {
      padding: 20px;
      border-right: 1px solid #1f2937;
    }

    .game {
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    #players li {
      list-style: none;
      padding: 6px;
      background: #1f2937;
      margin: 5px 0;
      border-radius: 6px;
      cursor: pointer;
    }

    #players li:hover {
      background: #374151;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      background: #111827;
      padding: 10px;
      border-radius: 10px;
    }

    .role {
      font-size: 16px;
      color: #fbbf24;
    }

    .turn {
      color: #22c55e;
      margin-top: 5px;
    }

    .phase {
      color: #60a5fa;
      margin-top: 5px;
    }

    .voteBox {
      display: none;
    }

    .hidden {
      display: none;
    }

    .redLine {
      text-align: center;
      color: #ef4444;
      font-weight: bold;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <h2>🎮 Impostor</h2>

    <input id="name" placeholder="Nick">
    <button onclick="createRoom()">Stwórz pokój</button>

    <input id="room" placeholder="Kod pokoju">
    <button onclick="joinRoom()">Dołącz</button>

    <button id="startBtn" onclick="startGame()" style="display:none;">
      Start (HOST)
    </button>

    <div class="card">
      <h3>Kod pokoju</h3>
      <div id="roomCode">---</div>
    </div>

    <div class="card">
      <h3>Gracze</h3>
      <ul id="players"></ul>
    </div>

    <div class="card">
      <div class="role" id="role">Czekanie...</div>
      <div class="phase" id="phase">---</div>
      <div class="turn" id="turn">---</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="game">

    <div class="card">
      <h3>Czat</h3>
      <div id="chat"></div>
    </div>

    <input id="msg" placeholder="Twoja odpowiedź / słowo">
    <button onclick="send()">Wyślij</button>

    <!-- VOTE -->
    <div class="card voteBox" id="voteBox">
      <h3>🗳 GŁOSOWANIE</h3>
      <ul id="voteList"></ul>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://impostor-game-tf4k.onrender.com");

let myId = null;
let currentRoom = "";
let myName = "";
let hostId = "";
let canVote = false;

socket.on("connect", () => {
  myId = socket.id;
});

/* CREATE */
function createRoom() {
  myName = document.getElementById("name").value;

  socket.emit("createRoom", myName, (res) => {
    currentRoom = res.roomCode;
    hostId = res.hostId;

    document.getElementById("roomCode").innerText = currentRoom;

    if (myId === hostId) {
      document.getElementById("startBtn").style.display = "block";
    }
  });
}

/* JOIN */
function joinRoom() {
  myName = document.getElementById("name").value;
  const code = document.getElementById("room").value;

  socket.emit("joinRoom", { roomCode: code, name: myName }, (res) => {
    currentRoom = code;
    hostId = res.hostId;

    document.getElementById("roomCode").innerText = currentRoom;

    if (myId === hostId) {
      document.getElementById("startBtn").style.display = "block";
    }
  });
}

/* START */
function startGame() {
  socket.emit("startGame", currentRoom);
}

/* SEND */
function send() {
  const msg = document.getElementById("msg").value;

  socket.emit("message", {
    roomCode: currentRoom,
    name: myName,
    message: msg
  });

  document.getElementById("msg").value = "";
}

/* ROLE */
socket.on("role", (data) => {
  document.getElementById("role").innerText =
    data.role === "IMPOSTOR"
      ? "🕵️ IMPOSTOR | " + data.hint
      : "👨‍🚀 CREWMATE | " + data.word;
});

/* ROUND */
socket.on("roundStart", (data) => {
  document.getElementById("chat").innerHTML += `
    <div class="redLine">━━━━━━━━━━ Runda ${data.round} ━━━━━━━━━━</div>
  `;
});

/* PHASE CHANGE */
socket.on("voteStart", (data) => {
  document.getElementById("phase").innerText = "FAZA: GŁOSOWANIE";

  document.getElementById("voteBox").style.display = "block";

  const list = document.getElementById("voteList");
  list.innerHTML = "";

  data.players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.name;

    li.onclick = () => {
      socket.emit("vote", {
        roomCode: currentRoom,
        targetId: p.id
      });

      document.getElementById("voteBox").style.display = "none";
    };

    list.appendChild(li);
  });
});

/* TURN / PLAY */
socket.on("message", (data) => {
  document.getElementById("chat").innerHTML +=
    `<p><b>${data.name}:</b> ${data.message}</p>`;
});

/* TURN INFO */
socket.on("turn", (data) => {
  document.getElementById("turn").innerText =
    "Tura: " + data.playerName;
});

/* GAME END */
socket.on("gameEnd", (data) => {
  alert("Wynik: " + data.winner + "\nSłowo: " + data.word);
});

/* PLAYERS */
socket.on("updatePlayers", (players) => {
  const ul = document.getElementById("players");
  ul.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.name;
    ul.appendChild(li);
  });
});

</script>

</body>
</html>
