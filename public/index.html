<!DOCTYPE html>
<html>
<head>
  <title>Impostor Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      height: 100vh;
    }

    .panel {
      padding: 20px;
      border-right: 1px solid #1f2937;
    }

    .game {
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 15px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    #players li {
      list-style: none;
      padding: 5px;
      background: #1f2937;
      margin: 5px 0;
      border-radius: 6px;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      background: #111827;
      padding: 10px;
      border-radius: 10px;
    }

    .role {
      font-size: 20px;
      margin: 10px 0;
      color: #fbbf24;
    }

    .topbar {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel">

    <div class="topbar">🎮 Impostor Game</div>

    <input id="name" placeholder="Twoje imię" />
    <button onclick="createRoom()">Stwórz pokój</button>

    <input id="room" placeholder="Kod pokoju" />
    <button onclick="joinRoom()">Dołącz</button>

    <button onclick="startGame()">Start gry</button>

    <div class="card">
      <div>👥 Gracze:</div>
      <ul id="players"></ul>
    </div>

    <div class="card">
      <div class="role" id="role">Czekanie na grę...</div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="game">

    <div class="card">
      <div>💬 Chat</div>
      <div id="chat"></div>
    </div>

    <input id="msg" placeholder="napisz wiadomość..." />
    <button onclick="send()">Wyślij</button>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://impostor-game-tf4k.onrender.com");

let currentRoom = "";
let myName = "";

/* ROOM */
function createRoom() {
  myName = document.getElementById("name").value;

  socket.emit("createRoom", myName, (res) => {
    currentRoom = res.roomCode;
    alert("Kod pokoju: " + currentRoom);
    updatePlayers(res.players);
  });
}

function joinRoom() {
  myName = document.getElementById("name").value;
  const roomCode = document.getElementById("room").value;

  socket.emit("joinRoom", { roomCode, name: myName }, (res) => {
    if (res.error) return alert(res.error);

    currentRoom = roomCode;
    updatePlayers(res.players);
  });
}

/* START */
function startGame() {
  socket.emit("startGame", currentRoom, (res) => {
    if (res?.error) alert(res.error);
  });
}

/* CHAT */
function send() {
  const message = document.getElementById("msg").value;

  socket.emit("message", {
    roomCode: currentRoom,
    name: myName,
    message
  });
}

/* SOCKET EVENTS */
socket.on("updatePlayers", updatePlayers);

socket.on("message", (data) => {
  document.getElementById("chat").innerHTML +=
    `<p><b>${data.name}:</b> ${data.message}</p>`;
});

socket.on("role", (data) => {
  if (data.role === "IMPOSTOR") {
    document.getElementById("role").innerText =
      "🕵️ IMPOSTOR - podpowiedź: " + data.hint;
  } else {
    document.getElementById("role").innerText =
      "👨‍🚀 CREWMATE - słowo: " + data.word;
  }
});

/* PLAYERS */
function updatePlayers(players) {
  const ul = document.getElementById("players");
  ul.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = "👤 " + p.name;
    ul.appendChild(li);
  });
}

</script>

</body>
</html>
