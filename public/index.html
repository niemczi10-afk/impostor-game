<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Słowny Impostor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
      grid-template-columns: 320px 1fr;
    }
    
    .signature {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    
    .signature span:nth-child(1) { color: #ef4444; }
    .signature span:nth-child(2) { color: #f97316; }
    .signature span:nth-child(3) { color: #eab308; }
    .signature span:nth-child(4) { color: #22c55e; }
    .signature span:nth-child(5) { color: #ffffff; }
    .signature span:nth-child(6) { color: #38bdf8; }
    .signature span:nth-child(7) { color: #6366f1; }
    .signature span:nth-child(8) { color: #ffffff; }
    .signature span:nth-child(9) { color: #ec4899; }
    .signature span:nth-child(10) { color: #ef4444; }
    .signature span:nth-child(11) { color: #f97316; }
    .signature span:nth-child(12) { color: #eab308; }
    .signature span:nth-child(13) { color: #22c55e; }
    .signature span:nth-child(14) { color: #38bdf8; }
    .signature span:nth-child(15) { color: #6366f1; }
    .signature span:nth-child(16) { color: #ffffff; }

    .card {
      background: #111827;
      border: 1px solid #243041;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      margin-bottom: 10px;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
      font-weight: 700;
    }

    button.secondary {
      background: #334155;
    }

    button:disabled,
    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .players, .chat, .turn-order {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .players li, .chat li {
      padding: 8px 10px;
      border-bottom: 1px solid #243041;
    }

    /* Turn order lista */
    .turn-order {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .turn-order li {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .turn-order li .turn-number {
      font-size: 0.78rem;
      color: #475569;
      min-width: 18px;
      transition: color 0.3s;
    }

    .turn-order li .turn-name {
      flex: 1;
      font-size: 0.95rem;
      transition: color 0.3s, font-weight 0.3s;
    }

    .turn-order li .turn-arrow {
      font-size: 0.75rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.3s ease, transform 0.3s ease, color 0.3s;
    }

    .turn-order li .turn-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 999px;
      opacity: 0;
      transform: scale(0.75);
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }

    /* Aktywna tura — inny gracz */
    .turn-order li.active-turn {
      background: rgba(37, 99, 235, 0.1);
      border-color: rgba(37, 99, 235, 0.35);
    }

    .turn-order li.active-turn .turn-arrow {
      opacity: 1;
      transform: translateX(0);
      color: #60a5fa;
    }

    .turn-order li.active-turn .turn-badge {
      opacity: 1;
      transform: scale(1);
      background: rgba(37, 99, 235, 0.2);
      color: #93c5fd;
      border: 1px solid rgba(37, 99, 235, 0.4);
    }

    .turn-order li.active-turn .turn-name {
      color: #bfdbfe;
    }

    /* Moja tura */
    .turn-order li.my-turn {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.4);
      animation: pulse-row 2s ease-in-out infinite;
    }

    .turn-order li.my-turn .turn-number {
      color: #34d399;
    }

    .turn-order li.my-turn .turn-name {
      color: #a7f3d0;
      font-weight: 700;
    }

    .turn-order li.my-turn .turn-arrow {
      opacity: 1;
      transform: translateX(0);
      color: #34d399;
      animation: arrow-bounce 0.8s ease-in-out infinite alternate;
    }

    .turn-order li.my-turn .turn-badge {
      opacity: 1;
      transform: scale(1);
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.45);
    }

    @keyframes pulse-row {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
      50% {
        box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.12);
      }
    }

    @keyframes arrow-bounce {
      from { transform: translateX(0); }
      to   { transform: translateX(5px); }
    }

    .chat-box {
      height: 360px;
      overflow-y: auto;
      background: #0b1220;
      border: 1px solid #243041;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    .hidden {
      display: none;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      background: #1f2937;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .vote-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .small {
      font-size: 0.92rem;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .msg-system {
      color: #ef4444;
      font-weight: 700;
    }

    .msg-player {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Słowny Impostor</h1>

      <div id="lobbyPanel">
        <h2>Lobby</h2>
        <input id="nick" placeholder="Twój nick" />
        <button id="createBtn">Stwórz pokój</button>
        <input id="roomCodeInput" placeholder="Kod pokoju" />
        <button id="joinBtn" class="secondary">Dołącz do pokoju</button>
      </div>

      <div id="roomPanel" class="hidden">
        <div class="pill" id="roomCodeLabel">Pokój: —</div>
        <div class="pill" id="roundLabel">Runda: —</div>
        <div class="pill" id="turnLabel">Tura: —</div>

        <button id="startBtn" class="hidden">Start gry</button>
        <div class="small" id="roleLabel"></div>

        <h3>Gracze</h3>
        <ul class="players" id="playersList"></ul>

        <div style="height: 1px; background: #243041; margin: 14px 0;"></div>

        <h3>Kolejność odpowiadania</h3>
        <div class="small">Ta kolejność zostaje taka sama przez całą grę.</div>
        <ul class="turn-order" id="turnOrderList"></ul>
      </div>
    </div>

    <div class="card">
      <h2>Czat gry</h2>
      <div class="chat-box">
        <ul class="chat" id="chatList"></ul>
      </div>

      <div class="row">
        <input id="messageInput" placeholder="Wpisz odpowiedź..." disabled />
        <button id="sendBtn">Wyślij odpowiedź</button>
      </div>

      <div id="votePanel" class="hidden" style="margin-top: 18px;">
        <h3>Głosowanie</h3>
        <div id="voteInfo" class="small"></div>
        <div class="vote-grid" id="voteButtons"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let roomCode = null;
    let hostId = null;
    let myRole = null;
    let myNick = null;
    let currentRound = 0;
    let currentTurnPlayerId = null;
    let currentPhase = "lobby";
    let playersCache = [];
    let turnOrderCache = [];

    const lobbyPanel = document.getElementById("lobbyPanel");
    const roomPanel = document.getElementById("roomPanel");
    const roomCodeLabel = document.getElementById("roomCodeLabel");
    const roundLabel = document.getElementById("roundLabel");
    const turnLabel = document.getElementById("turnLabel");
    const playersList = document.getElementById("playersList");
    const turnOrderList = document.getElementById("turnOrderList");
    const chatList = document.getElementById("chatList");
    const roleLabel = document.getElementById("roleLabel");
    const startBtn = document.getElementById("startBtn");
    const votePanel = document.getElementById("votePanel");
    const voteButtons = document.getElementById("voteButtons");
    const voteInfo = document.getElementById("voteInfo");
    const messageInput = document.getElementById("messageInput");

    function appendChat(text, system = false) {
      const li = document.createElement("li");
      li.className = system ? "msg-system" : "msg-player";
      li.textContent = system ? `• ${text}` : text;
      chatList.appendChild(li);
      const box = document.querySelector(".chat-box");
      box.scrollTop = box.scrollHeight;
    }

    function clearChat() {
      chatList.innerHTML = "";
    }

    function renderPlayers(players) {
      playersList.innerHTML = "";
      players.forEach((p) => {
        const li = document.createElement("li");
        li.textContent = p.name + (p.id === hostId ? " — host" : "");
        playersList.appendChild(li);
      });
    }

    function renderTurnOrder(turnOrder, activeTurnPlayerId) {
      turnOrderList.innerHTML = "";

      if (!turnOrder || !turnOrder.length) {
        const li = document.createElement("li");
        li.textContent = "Brak ustalonej kolejności.";
        turnOrderList.appendChild(li);
        return;
      }

      turnOrder.forEach((id, index) => {
        const player = playersCache.find((p) => p.id === id);
        const name = player ? player.name : "Gracz";
        const isActive = id === activeTurnPlayerId;
        const isMe = isActive && id === socket.id;

        const li = document.createElement("li");
        if (isMe) {
          li.className = "my-turn";
        } else if (isActive) {
          li.className = "active-turn";
        }

        const numSpan = document.createElement("span");
        numSpan.className = "turn-number";
        numSpan.textContent = `${index + 1}.`;

        const nameSpan = document.createElement("span");
        nameSpan.className = "turn-name";
        nameSpan.textContent = name;

        const arrowSpan = document.createElement("span");
        arrowSpan.className = "turn-arrow";
        arrowSpan.textContent = "▶";

        const badgeSpan = document.createElement("span");
        badgeSpan.className = "turn-badge";
        badgeSpan.textContent = isMe ? "TWOJA TURA!" : "teraz gra";

        li.appendChild(numSpan);
        li.appendChild(nameSpan);
        li.appendChild(arrowSpan);
        li.appendChild(badgeSpan);
        turnOrderList.appendChild(li);
      });
    }

    function refreshStartButton(phase) {
      const isHost = socket.id === hostId;
      const canShow = isHost && (phase === "lobby" || phase === "ended");
      startBtn.classList.toggle("hidden", !canShow);
      startBtn.textContent = phase === "ended" ? "Start nowej gry" : "Start gry";
    }

    function setMessageState() {
      const canWrite = currentPhase === "play" && currentTurnPlayerId === socket.id;
      messageInput.disabled = !canWrite;
    }

    function showRoom(code) {
      roomCode = code;
      lobbyPanel.classList.add("hidden");
      roomPanel.classList.remove("hidden");
      roomCodeLabel.textContent = `Pokój: ${code}`;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || messageInput.disabled) return;
      socket.emit("message", { code: roomCode, text });
      messageInput.value = "";
    }

    document.getElementById("createBtn").addEventListener("click", () => {
      myNick = document.getElementById("nick").value.trim();
      socket.emit("createRoom", { name: myNick });
    });

    document.getElementById("joinBtn").addEventListener("click", () => {
      myNick = document.getElementById("nick").value.trim();
      socket.emit("joinRoom", {
        code: document.getElementById("roomCodeInput").value,
        name: myNick,
      });
    });

    startBtn.addEventListener("click", () => {
      socket.emit("startGame", { code: roomCode });
    });

    document.getElementById("sendBtn").addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); sendMessage(); }
    });

    socket.on("connect", () => {
      if (roomCode && myNick) {
        socket.emit("joinRoom", { code: roomCode, name: myNick });
      }
    });

    socket.on("roomJoined", ({ code, hostId: newHostId, reconnected }) => {
      hostId = newHostId;
      showRoom(code);
      refreshStartButton(currentPhase);
      if (reconnected) appendChat("Połączono ponownie z pokojem.", true);
    });

    socket.on("updatePlayers", ({ players, hostId: newHostId, phase, round, turnOrder, currentTurnPlayerId: turnPlayerId }) => {
      hostId = newHostId;
      currentPhase = phase || currentPhase;
      currentRound = round || currentRound || 0;
      playersCache = players || [];
      turnOrderCache = turnOrder || [];
      currentTurnPlayerId = turnPlayerId || currentTurnPlayerId;

      roundLabel.textContent = `Runda: ${currentRound || "—"}`;
      renderPlayers(playersCache);
      renderTurnOrder(turnOrderCache, currentTurnPlayerId);
      refreshStartButton(currentPhase);
      setMessageState();
    });

    socket.on("role", (data) => {
      myRole = data.role;
      if (data.role === "impostor") {
        roleLabel.innerHTML = `Twoja rola: <strong style="color:#ef4444">IMPOSTOR</strong>. Podpowiedź: <strong style="color:#ffffff">${data.hint}</strong>`;
      } else {
        roleLabel.innerHTML = `Twoja rola: <strong style="color:#22c55e">CREWMATE</strong>. Słowo: <strong style="color:#ffffff">${data.word}</strong>`;
      }
    });

    socket.on("roundStart", ({ round }) => {
      currentPhase = "play";
      currentRound = round;
      roundLabel.textContent = `Runda: ${round}`;
      votePanel.classList.add("hidden");
      voteButtons.innerHTML = "";
      voteInfo.textContent = "";
      refreshStartButton(currentPhase);
      setMessageState();
    });

    socket.on("turnStart", ({ playerId, playerName, turnNumber, total, round }) => {
      currentPhase = "play";
      currentTurnPlayerId = playerId;
      currentRound = round;
      roundLabel.textContent = `Runda: ${round}`;
      turnLabel.textContent = playerId === socket.id
        ? `Twoja tura (${turnNumber}/${total})`
        : `Tura: ${playerName} (${turnNumber}/${total})`;

      renderTurnOrder(turnOrderCache, currentTurnPlayerId);
      setMessageState();

      if (playerId === socket.id) messageInput.focus();
    });

    socket.on("gameReset", () => {
      currentPhase = "play";
      clearChat();
      votePanel.classList.add("hidden");
      voteButtons.innerHTML = "";
      voteInfo.textContent = "";
      roleLabel.textContent = "";
      turnLabel.textContent = "Tura: —";
      currentTurnPlayerId = null;
      messageInput.value = "";
      messageInput.disabled = true;
      renderTurnOrder(turnOrderCache, null);
      refreshStartButton(currentPhase);
    });

    socket.on("message", (data) => {
      if (data.system) { appendChat(data.text, true); return; }
      appendChat(`${data.playerName}: ${data.text}`);
    });

    socket.on("voteStart", ({ round, players }) => {
      currentPhase = "vote";
      currentRound = round;
      roundLabel.textContent = `Runda: ${round}`;
      currentTurnPlayerId = null;

      renderTurnOrder(turnOrderCache, null);

      votePanel.classList.remove("hidden");
      voteButtons.innerHTML = "";
      voteInfo.textContent = "Wybierz gracza albo wstrzymaj się od głosu.";

      messageInput.disabled = true;
      turnLabel.textContent = "Tura: głosowanie";

      players.forEach((player) => {
        if (player.id === socket.id) return;
        const btn = document.createElement("button");
        btn.textContent = `Głosuję na: ${player.name}`;
        btn.addEventListener("click", () => {
          socket.emit("vote", { code: roomCode, target: player.id });
          votePanel.classList.add("hidden");
          voteButtons.innerHTML = "";
          voteInfo.textContent = "";
        });
        voteButtons.appendChild(btn);
      });

      const abstainBtn = document.createElement("button");
      abstainBtn.className = "secondary";
      abstainBtn.textContent = "Wstrzymaj się od głosu";
      abstainBtn.addEventListener("click", () => {
        socket.emit("vote", { code: roomCode, target: null });
        votePanel.classList.add("hidden");
        voteButtons.innerHTML = "";
        voteInfo.textContent = "";
      });
      voteButtons.appendChild(abstainBtn);

      refreshStartButton(currentPhase);
    });

    socket.on("gameEnd", ({ winner, word, impostorName }) => {
      currentPhase = "ended";
      votePanel.classList.add("hidden");
      voteButtons.innerHTML = "";
      voteInfo.textContent = "";
      messageInput.disabled = true;
      currentTurnPlayerId = null;
      turnLabel.textContent = "Tura: —";

      renderTurnOrder(turnOrderCache, null);

      if (winner === "crewmates") {
        appendChat(`Gra zakończona. Wygrywają crewmates! Impostor: ${impostorName}. Hasło: ${word}`, true);
      } else {
        appendChat(`Gra zakończona. Wygrywa impostor ${impostorName}! Hasło: ${word}`, true);
      }

      refreshStartButton(currentPhase);
    });

    socket.on("errorMessage", (msg) => {
      alert(msg);
    });
  </script>

  <div class="signature">
    <span>m</span><span>a</span><span>d</span><span>e</span>
    <span> </span>
    <span>b</span><span>y</span>
    <span> </span>
    <span>n</span><span>i</span><span>e</span><span>m</span><span>c</span><span>z</span><span>i</span>
    <span> </span>
    <span>(</span><span>b</span><span>e</span><span>z</span>
    <span> </span>
    <span>A</span><span>I</span>
    <span> </span>
    <span>s</span><span>e</span><span>r</span><span>j</span><span>o</span><span>)</span>
  </div>
  
</body>
</html>
