<!DOCTYPE html>
<html>
<head>
  <title>Impostor Game</title>
</head>
<body>

<h2>Lobby</h2>

<input id="name" placeholder="Twoje imię" />
<button onclick="createRoom()">Stwórz pokój</button>

<br><br>

<input id="code" placeholder="Kod pokoju" />
<button onclick="joinRoom()">Dołącz</button>

<h3 id="roomCode"></h3>

<ul id="players"></ul>

<button id="startBtn" onclick="startGame()" style="display:none">
START
</button>

<hr>

<h3 id="role"></h3>

<input id="msg" placeholder="Twoje słowo" />
<button onclick="sendMsg()">Wyślij</button>

<ul id="chat"></ul>

<hr>

<h3>Głosowanie</h3>
<div id="votes"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let roomCode = null;

function createRoom() {
  const name = document.getElementById("name").value;
  socket.emit("createRoom", name);
}

function joinRoom() {
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value;
  socket.emit("joinRoom", { code, name });
}

socket.on("roomJoined", (code) => {
  roomCode = code;
  document.getElementById("roomCode").innerText = "Kod: " + code;
});

socket.on("updatePlayers", (players) => {
  const ul = document.getElementById("players");
  ul.innerHTML = "";

  players.forEach((p) => {
    const li = document.createElement("li");
    li.innerText = p.name;
    ul.appendChild(li);
  });

  document.getElementById("startBtn").style.display = "block";
});

function startGame() {
  socket.emit("startGame", roomCode);
}

socket.on("role", (data) => {
  if (data.role === "impostor") {
    document.getElementById("role").innerText =
      "Jesteś IMPOSTOREM. Hint: " + data.hint;
  } else {
    document.getElementById("role").innerText =
      "Słowo: " + data.word;
  }
});

function sendMsg() {
  const text = document.getElementById("msg").value;
  socket.emit("message", { code: roomCode, text });
}

socket.on("message", (msg) => {
  const li = document.createElement("li");
  li.innerText = msg.text;
  document.getElementById("chat").appendChild(li);
});

socket.on("voteStart", () => {
  document.getElementById("votes").innerHTML = "Głosowanie!";
});

socket.on("gameEnd", (data) => {
  alert("Wygrana: " + data.winner + " | słowo: " + data.word);
  location.reload();
});
</script>

</body>
</html>
