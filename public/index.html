<!DOCTYPE html>
<html>
<head>
  <title>Impostor Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      height: 100vh;
    }

    .panel {
      padding: 20px;
      border-right: 1px solid #1f2937;
    }

    .game {
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    #players li {
      list-style: none;
      padding: 6px;
      background: #1f2937;
      margin: 5px 0;
      border-radius: 6px;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      background: #111827;
      padding: 10px;
      border-radius: 10px;
    }

    .role {
      font-size: 18px;
      margin-top: 10px;
      color: #fbbf24;
    }

    .turn {
      margin-top: 10px;
      color: #22c55e;
    }

    .disabled {
      background: #374151 !important;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <h2>🎮 Impostor</h2>

    <input id="name" placeholder="Twoje imię">
    <button onclick="createRoom()">Stwórz pokój</button>

    <input id="room" placeholder="Kod pokoju">
    <button onclick="joinRoom()">Dołącz</button>

    <button onclick="startGame()">Start gry</button>

    <div class="card">
      <h3>👥 Gracze</h3>
      <ul id="players"></ul>
    </div>

    <div class="card">
      <div class="role" id="role">Czekanie...</div>
      <div class="turn" id="turn">---</div>
    </div>

    <div class="card">
      <h3>📜 Historia haseł</h3>
      <ul id="history"></ul>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="game">

    <div class="card">
      <h3>💬 Gra</h3>
      <div id="chat"></div>
    </div>

    <input id="msg" placeholder="Twoje słowo..." />
    <button id="sendBtn" onclick="send()">Wyślij</button>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://impostor-game-tf4k.onrender.com");

let currentRoom = "";
let myName = "";
let myId = null;
let currentTurnId = null;

/* CONNECT */
socket.on("connect", () => {
  myId = socket.id;
});

/* CREATE ROOM */
function createRoom() {
  myName = document.getElementById("name").value;

  socket.emit("createRoom", myName, (res) => {
    currentRoom = res.roomCode;
    updatePlayers(res.players);
    alert("Kod: " + currentRoom);
  });
}

/* JOIN */
function joinRoom() {
  myName = document.getElementById("name").value;
  const code = document.getElementById("room").value;

  socket.emit("joinRoom", { roomCode: code, name: myName }, (res) => {
    if (res.error) return alert(res.error);

    currentRoom = code;
    updatePlayers(res.players);
  });
}

/* START */
function startGame() {
  socket.emit("startGame", currentRoom);
}

/* SEND */
function send() {
  if (myId !== currentTurnId) return;

  const msg = document.getElementById("msg").value;

  socket.emit("message", {
    roomCode: currentRoom,
    name: myName,
    message: msg
  });

  document.getElementById("msg").value = "";
}

/* EVENTS */

socket.on("updatePlayers", updatePlayers);

socket.on("message", (data) => {
  document.getElementById("chat").innerHTML +=
    `<p><b>${data.name}:</b> ${data.message}</p>`;
});

socket.on("role", (data) => {
  if (data.role === "IMPOSTOR") {
    document.getElementById("role").innerText =
      "🕵️ IMPOSTOR | Podpowiedź: " + data.hint;
  } else {
    document.getElementById("role").innerText =
      "👨‍🚀 CREWMATE | Słowo: " + data.word;
  }
});

/* TURN */
socket.on("turn", (data) => {
  currentTurnId = data.playerId;

  if (currentTurnId === myId) {
    document.getElementById("turn").innerText = "👉 Twoja tura!";
    enableInput(true);
  } else {
    document.getElementById("turn").innerText = "Czekaj na swoją turę...";
    enableInput(false);
  }
});

/* HISTORY */
socket.on("history", (history) => {
  const ul = document.getElementById("history");
  ul.innerHTML = "";

  history.forEach(word => {
    const li = document.createElement("li");
    li.innerText = word;
    ul.appendChild(li);
  });
});

/* GAME END */
socket.on("gameEnd", (data) => {
  alert(`Wygrywa: ${data.winner}\nSłowo: ${data.word}`);
});

/* HELPERS */

function enableInput(state) {
  const input = document.getElementById("msg");
  const btn = document.getElementById("sendBtn");

  input.disabled = !state;

  if (!state) {
    btn.classList.add("disabled");
  } else {
    btn.classList.remove("disabled");
  }
}

function updatePlayers(players) {
  const ul = document.getElementById("players");
  ul.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.name;
    ul.appendChild(li);
  });
}

</script>

</body>
</html>
